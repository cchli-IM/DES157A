<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
    <!-- Google Fonts -->

    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
    <title>Ruins N' Glory</title>
</head>
<body>
    <!-- Player and NPC Images -->
    <header>Ruins N' Glory</header>
  
 

    <!-- Player Information -->  
     <section class="character-visuals">
        <img src="#" alt="Player Character">
    </section>

    <section id="pl-info">
        <h2 id="npc-name"> <!-- Default placeholder, should be changeable-->
            Player
        </h2>
        <article id="pl-stats">
            <h2 >
                Health: <section id="health"><img id="pl-health-bar" src="" alt=""></section>
            </h2>
            <h2>
                Status Effects: <section id="pl-poison-status"></section><section id="pl-cursed-status"></section>
            </h2>
        </article>
    </section>

     <!-- NPC Information -->
    <main id="upperscreen">
    <section class="npc-visuals">
        <img src="#" alt="NPC Character">

        <section id="context-box">
            <p>Proceed with caution!</p>
        </section>
    </section>
    </main>
    <section id="ncp-info">
            <h2 id="npc-name">
                NPC Name Placeholder
            </h2>
            <article id="npc-stats">
                <h2 >
                    Health: <section id="health"><img id="pl-health-bar" src="" alt=""></section>
                </h2>
                <h2>
                    Status Effects: <section id="npc-poison-status"></section> <section id="npc-cursed-status"></section>
                </h2>
            </article>
    </section>

 
    
    <section id="slots">
        <img id="slot1" src="#" alt="slot1">
        <img id="slot1-atk" src="#" alt="slot1-atk">
        <img id="slot1-def" src="#" alt="slot1-def">
        <img id="slot1-heal" src="#" alt="slot1-heal">
        <img id="slot1-crit" src="#" alt="slot1-crit">
        <img id="slot1-poison" src="#" alt="slot1-poison">
        <img id="slot1-cursed" src="#" alt="slot1-cursed">

        <img id="slot2" src="#" alt="slot2">
        <img id="slot2-atk" src="#" alt="slot2-atk">
        <img id="slot2-def" src="#" alt="slot2-def">
        <img id="slot2-heal" src="#" alt="slot2-heal">
        <img id="slot2-crit" src="#" alt="slot2-crit">
        <img id="slot2-poison" src="#" alt="slot2-poison">
        <img id="slot2-cursed" src="#" alt="slot2-cursed">

        <img id="slot3" src="#" alt="slot3">
        <img id="slot3-atk" src="#" alt="slot3-atk">
        <img id="slot3-def" src="#" alt="slot3-def">
        <img id="slot3-heal" src="#" alt="slot3-heal">
        <img id="slot3-crit" src="#" alt="slot3-crit">
        <img id="slot3-poison" src="#" alt="slot3-poison">
        <img id="slot3-cursed" src="#" alt="slot3-cursed">
    </section>


</body>
</html>
